services:
  postgres:
    image: postgres:16-alpine
    container_name: multi-rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  chroma:
    image: chromadb/chroma:latest
    container_name: multi-rag-chroma
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8000:8000"
    networks:
      - rag-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multi-rag-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpass}@postgres:5432/${POSTGRES_DB:-ragdb}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://localhost:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5}
      - API_TOKEN=${API_TOKEN:-rag-token-secret}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - CROSS_ENCODER_MODEL=${CROSS_ENCODER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - models_data:/app/models
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multi-rag-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rag-network

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
  models_data:

networks:
  rag-network:
    driver: bridge
