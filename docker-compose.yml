services:
  postgres:
    image: postgres:16-alpine
    container_name: multi-rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  chroma:
    image: chromadb/chroma:latest
    container_name: multi-rag-chroma
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8000:8000"
    networks:
      - rag-network

  neo4j:
    image: neo4j:5.16-community
    container_name: multi-rag-neo4j
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    environment:
      - NEO4J_AUTH=neo4j/raggraphpass
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_export_file_enabled=true
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multi-rag-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpass}@postgres:5432/${POSTGRES_DB:-ragdb}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-raggraphpass}
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://localhost:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5}
      - API_TOKEN=${API_TOKEN:-rag-token-secret}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - CROSS_ENCODER_MODEL=${CROSS_ENCODER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - models_data:/app/models
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multi-rag-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rag-network

volumes:
  postgres_data:
  chroma_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  uploads_data:
  models_data:

networks:
  rag-network:
    driver: bridge
